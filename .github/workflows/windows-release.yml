name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows portable app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable Windows app
        run: npm run windows:package

      - name: Create zip artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "manual" }
          $source = "dist-windows\Surge Relay-win32-x64"
          $zip = "dist-windows\SurgeRelay-Windows-$version-win32-x64.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $zip -Force
          echo "ZIP_PATH=$zip" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SurgeRelay-Windows
          path: ${{ env.ZIP_PATH }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
